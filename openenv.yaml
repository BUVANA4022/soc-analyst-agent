version: "1.0.0"
name: "soc-analyst-v1"
description: "A high-fidelity SOC simulator for training agents in incident response and forensics."
entry_point: "env:SOCEnvironment"
tasks:
  - id: "easy-signature-check"
    difficulty: "easy"
    description: "Verify if a suspicious process has a valid digital signature."
  - id: "medium-lateral-trace"
    difficulty: "medium"
    description: "Trace lateral movement across network logs to find the patient zero IP."
  - id: "hard-reverse-shell"
    difficulty: "hard"
    description: "Identify and terminate an active reverse shell without crashing the system."